name: Sakanakun Notify

on:
  schedule:
    - cron: '0 21 * * *'  # 毎日 6:00 JST (UTC 21:00)
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sakanakun notify
        run: python src/sakanakun/sakanakun_main.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL_SAKANAKUN: ${{ secrets.DISCORD_WEBHOOK_URL_SAKANAKUN }}
          PYTHONPATH: src/reminkun
